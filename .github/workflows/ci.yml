name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # arm64 runners: same architecture as the Parallels guests this tool drives
        runner: [ubuntu-24.04-arm, windows-11-arm, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy -p a11y-probe --all-targets -- -D warnings
      - run: cargo nextest run

  crap:
    name: coverage + cargo-crap
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov,cargo-binstall
      - run: cargo binstall -y --force cargo-crap  # --force: rust-cache restores .crates.toml without the binary
      - run: cargo llvm-cov nextest --lcov --output-path target/lcov.info
      - run: cargo crap --lcov target/lcov.info

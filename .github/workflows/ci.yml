name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # arm64 runners: same architecture as the Parallels guests this tool drives
        runner: [ubuntu-24.04-arm, windows-11-arm, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      # No toolchain action: rust-toolchain.toml names the version and its
      # components, and the rustup every runner image ships installs it on the
      # first cargo call. Pinning it here as well would be a second source of
      # truth that the file silently wins against.
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo fmt --all -- --check
      # --features test-fake builds and lints the fake-prlctl test double, which
      # is gated off by default so a plain `cargo install` never ships it.
      - run: cargo clippy --all-targets --features test-fake -- -D warnings
      - run: cargo clippy -p a11y-probe --all-targets -- -D warnings
      - run: cargo nextest run --features test-fake

  crap:
    name: coverage + cargo-crap
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      # Coverage-only, so it is not in rust-toolchain.toml's components — every
      # guest and contributor would pay for it. Added to the pinned toolchain
      # rather than to whichever one rustup happens to default to.
      - run: rustup component add llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov,cargo-binstall
      - run: cargo binstall -y --force cargo-crap  # --force: rust-cache restores .crates.toml without the binary
      - run: cargo llvm-cov nextest --features test-fake --lcov --output-path target/lcov.info
      - run: cargo crap --lcov target/lcov.info

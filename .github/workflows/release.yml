name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # One job creates the release, alone, before any builder runs. When the five
  # builders raced `gh release create || true`, two could win at once and GitHub
  # minted two release objects on one tag — v0.2.0 shipped with an empty twin
  # that "latest release" tooling could land on.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create the release if the tag does not have one yet
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "${{ github.ref_name }}" \
            || gh release create "${{ github.ref_name }}" --verify-tag --generate-notes

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - runner: macos-latest
            triple: aarch64-apple-darwin
            bin: vm
          - runner: ubuntu-24.04-arm
            triple: aarch64-unknown-linux-gnu
            bin: vm
          - runner: windows-11-arm
            triple: aarch64-pc-windows-msvc
            bin: vm.exe
          # x86_64 too, so `ubi:akesson/vm` also resolves on GitHub's default
          # x64 runners (ubuntu-latest / windows-latest). Built natively on x64
          # runners — no cross-compilation. macOS stays arm64-only.
          - runner: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            bin: vm
          - runner: windows-latest
            triple: x86_64-pc-windows-msvc
            bin: vm.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      # Released binaries are built by the compiler the repo names, not by
      # whatever `stable` meant on the day of the tag: rust-toolchain.toml
      # decides, and the rustup on every runner image installs it.
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked
      - name: Package
        shell: bash
        run: |
          cp "target/release/${{ matrix.bin }}" "vm-${{ matrix.triple }}${{ matrix.bin == 'vm.exe' && '.exe' || '' }}"
      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "vm-${{ matrix.triple }}"* --clobber

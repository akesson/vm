[tools]
"cargo:cargo-nextest" = "latest"
"cargo:cargo-llvm-cov" = "latest"
"cargo:cargo-crap" = "latest"

[tasks.build]
run = "cargo build"
description = "Build the vm binary"

[tasks.test]
run = "cargo nextest run"
description = "Run tests"

[tasks.lint]
usage = 'flag "--check" help="Check only, do not auto-fix"'
run = '''
if [ "${usage_check}" = "true" ]; then
  cargo fmt --all -- --check
  cargo clippy --workspace --all-targets -- -D warnings
else
  cargo fmt --all
  cargo clippy --workspace --all-targets --fix --allow-dirty -- -D warnings
fi
'''
description = "Format and lint (--check for CI mode)"

[tasks.a11y-probe]
usage = 'arg "[target]" help="VM alias or OS (windows|linux|macos), or all" default="all"'
run = '''
targets="${usage_target}"
if [ "$targets" = "all" ]; then targets="windows linux macos"; fi
rc=0
for t in $targets; do
  echo "── a11y-probe ▸ $t ──"
  vm exec "$t" -- cargo run -p a11y-probe --release || rc=1
done
exit $rc
'''
description = "Run the tier-0 accessibility probe inside guest VMs"

[tasks.crap]
run = """
cargo llvm-cov nextest --lcov --output-path target/lcov.info
cargo crap --lcov target/lcov.info
"""
description = "Rank complex-and-untested functions (CRAP metric)"

[tasks.install]
run = "cargo install --path . --locked"
description = "Install vm into ~/.cargo/bin"

[tools]
"cargo:cargo-nextest" = "latest"
"cargo:cargo-llvm-cov" = "latest"
"cargo:cargo-crap" = "latest"

[tasks.build]
run = "cargo build"
description = "Build the vm binary"

[tasks.test]
run = "cargo nextest run"
description = "Run tests"

[tasks.lint]
usage = 'flag "--check" help="Check only, do not auto-fix"'
run = '''
if [ "${usage_check}" = "true" ]; then
  cargo fmt --all -- --check
  cargo clippy --workspace --all-targets -- -D warnings
else
  cargo fmt --all
  cargo clippy --workspace --all-targets --fix --allow-dirty -- -D warnings
fi
'''
description = "Format and lint (--check for CI mode)"

[tasks.a11y-probe]
# Targets are vm aliases. vm addresses VMs by alias only, so this line assumes
# the machine config names them after their OS (see the README's "Targets") —
# `vm exec windows` against a config whose Windows VM is called `win` is an
# error, and says exactly which rename to make.
usage = 'arg "[target]" help="VM alias (conventionally windows|linux|macos), or all" default="all"'
run = '''
targets="${usage_target}"
if [ "$targets" = "all" ]; then targets="windows linux macos"; fi
rc=0
for t in $targets; do
  echo "── a11y-probe ▸ $t ──"
  vm exec "$t" -- cargo run -p a11y-probe --release || rc=1
done
exit $rc
'''
description = "Run the tier-0 accessibility probe inside guest VMs"

[tasks.test-real]
# The lane that runs against real Parallels guests, and the only one that can:
# every other test replaces Parallels with something that behaves the way vm
# *believes* Parallels behaves, which is exactly what cannot be checked that way.
# It takes VMs up and down and kills runs mid-flight, so it is opt-in and never
# runs in CI.
usage = 'arg "[target]" help="VM alias (conventionally windows|linux|macos), or all" default="all"'
run = '''
targets="${usage_target}"
if [ "$targets" = "all" ]; then targets="linux,windows,macos"; fi
VM_REAL_TARGETS="$targets" cargo nextest run --no-fail-fast \
  --run-ignored ignored-only -E 'binary(real_vm)'
'''
description = "Run the test suite against real Parallels guests"

[tasks.quirk-canary]
# Re-measure the Parallels behaviours vm's guards are built on — the argv size
# that hangs prlctl, the wording of a refused session, the status vocabulary, the
# JSON shapes, the address ladder of a cold boot. A Parallels update that moves
# one of these breaks vm silently, weeks later, as "it hangs sometimes". Run it
# before and after an upgrade and believe the diff.
usage = 'arg "[target]" help="VM alias (conventionally windows|linux|macos), or all" default="all"'
run = '''
targets="${usage_target}"
if [ "$targets" = "all" ]; then targets="linux,windows,macos"; fi
VM_REAL_TARGETS="$targets" cargo nextest run --no-fail-fast \
  --run-ignored ignored-only -E 'binary(canary)'
'''
description = "Re-measure the Parallels quirks vm is built around"

[tasks.crap]
run = """
cargo llvm-cov nextest --lcov --output-path target/lcov.info
cargo crap --lcov target/lcov.info
"""
description = "Rank complex-and-untested functions (CRAP metric)"

[tasks.install]
# --bin vm: the package also builds `fake-prlctl` for the lifecycle tests, and
# a test double has no business in anyone's PATH.
run = "cargo install --path . --locked --bin vm"
description = "Install vm into ~/.cargo/bin"

[package]
name = "vm"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.103"
clap = { version = "4.6.1", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
toml = "1.1.2"

[target."cfg(unix)".dependencies]
nix = { version = "0.31.3", features = ["signal", "process"] }

[dev-dependencies]
tempfile = "3.27.0"
